name: Token Refresh
run-name: "Token Refresh - ${{ github.event_name == 'schedule' && 'Scheduled' || 'Manual' }} Run (${{ github.run_number }})"

# Refreshes long-lived Instagram (IGAA) and Threads access tokens before
# their 60-day expiry, writing the rotated value back to the relevant
# GitHub Environment secret. See docs/refactor/04-token-refresh-spec.md and
# docs/refactor/runbooks/token-refresh-ops.md.
#
# Tokens are refreshable once >= 24h old; a weekly cadence leaves ~7 weeks
# of margin after any single failure before the 60-day expiry is at risk.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to refresh (leave as "all" to run both)'
        type: choice
        options:
          - all
          - primary-account
          - secondary-account
        default: all

permissions:
  contents: read

jobs:
  refresh:
    name: Refresh tokens (${{ matrix.environment }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: false
      matrix:
        environment:
          - primary-account
          - secondary-account

    steps:
      - name: Checkout repository
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.environment }}
        uses: actions/checkout@v4

      - name: Set up Python environment
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.environment }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.environment }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh tokens for ${{ matrix.environment }}
        if: ${{ github.event_name == 'schedule' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.environment }}
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN || '' }}
          # Email notification settings (optional; consolidated alert path)
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL || '' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || '' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME || '' }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || '' }}
          # gh CLI needs Secrets:write on this repo - the default GITHUB_TOKEN
          # cannot write secrets, so a dedicated fine-grained PAT is required.
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_ADMIN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing PAT::GH_PAT_SECRETS_ADMIN repo secret is not set. See README.md for setup."
            exit 1
          fi
          python token_refresh.py --env-name "${{ matrix.environment }}"

      - name: Report failure
        if: ${{ failure() && (github.event_name == 'schedule' || github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.environment) }}
        run: |
          echo "::error title=Token refresh failed::Refresh failed for ${{ matrix.environment }}. An alert email has been sent (if configured); see the job log above for details. Token values are never logged."
